<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bocchi The Rock</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/jpg" href="static/icon.jpg" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <span>KESSOKU</span>
        <span>BAND</span>
      </div>
      <ul class="nav-links">
        <li><a href="#home.">Home</a></li>
        <li><a href="#band">Kessoku Band</a></li>
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#Bocchi">Bocchi The Rock!</a></li>
      </ul>
    </nav>
    <section id="home." class="hero">
      <video
        class="hero-vid"
        autoplay
        muted
        loop
        playsinline
        src="static/hero-vid.mp4"
      ></video>
      <h1 class="hero-title">
        <span>Bocchi</span>
        <span>The</span>
        <span>Rock</span>
      </h1>
      <h2 class="quote">"Abandoning your uniqueness is equivalent to dying"</h2>
    </section>
    <section id="band" class="band">
      <video
        class="band-vid"
        id="myVideo"
        autoplay
        muted
        loop
        playsinline
        src="static/kessoku-band-bocchi-the-rock-moewalls-com.mp4"
      ></video>
      <script>
        // Select the video element
        const video = document.getElementById("myVideo");

        // Set the speed to 2x (double speed)
        video.playbackRate = 3;
      </script>
    </section>
    <section id="gallery" class="gallery">
      <h2 class="gallery-header">G A L L E R Y</h2>
      <div class="grid-container">
        <div class="img img1"></div>
        <div class="imgg"></div>
        <div class="img unique1"></div>
        <div class="imgg"></div>
        <div class="img img5"></div>
        <div class="img unique2"></div>
        <div class="imgg"></div>
        <div class="img img8"></div>
        <div class="imgg"></div>
        <div class="img img10"></div>
        <div class="imgg"></div>
        <div class="img img12"></div>
      </div>
    </section>
    <section id="Bocchi" class="bocchi">
      <a
        href="https://www.crunchyroll.com/series/GXJHM3P19/bocchi-the-rock?srsltid=AfmBOoqJfcyk5t5o0tyxGJySXkSGq6VKLYI7G5oa9O-euymr2EfLE2bc"
      >
        <button type="button">Watch on Crunchyroll</button></a
      >
    </section>
  </body>
</html>
